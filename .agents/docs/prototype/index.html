<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>狼人杀原型（移动竖版）</title>
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/mobile.css" />
  </head>
  <body>
    <div class="phone-shell">
      <header class="app-header">
        <div class="app-header-row">
          <h1>狼人杀原型</h1>
          <button class="help-btn" data-open-modal="modal-help" aria-label="打开帮助">❓帮助</button>
        </div>
        <p>标准模式 · 6-12 人 · 固定预设</p>
      </header>

      <nav class="top-nav" aria-label="页面导航">
        <button data-page="join">加入</button>
        <button data-page="lobby">大厅</button>
        <button data-page="role">角色</button>
        <button data-page="wolf">狼人</button>
        <button data-page="witch">女巫</button>
        <button data-page="vote">投票</button>
        <button data-page="host">主机</button>
        <button data-page="disconnect">断线</button>
      </nav>

      <main id="app" class="app-main" aria-live="polite"></main>
    </div>

    <div class="modal" id="modal-help">
      <div class="modal-panel stack">
        <h3>规则帮助</h3>
        <p class="muted">简要规则</p>
        <ul class="list rule-list">
          <li>6-12 人开局，标准预设固定且主机不可手调。</li>
          <li>6-9 人屠城：狼人数量 >= 存活好人数量即胜。</li>
          <li>10-12 人屠边：屠神或屠民任一达成即胜。</li>
          <li>白天自由讨论无计时，平票仅重投一轮。</li>
        </ul>
        <p class="muted">职业说明</p>
        <ul class="list rule-list">
          <li>预言家：每晚查验一人身份。</li>
          <li>女巫：一瓶解药 + 一瓶毒药，同夜不能双用。</li>
          <li>猎人：死于狼刀/放逐可开枪；死于毒杀不能开枪。</li>
          <li>守卫：每晚守一人，不能连续守同一人。</li>
          <li>白痴：被放逐翻牌存活，失去投票权。</li>
        </ul>
        <button class="btn btn-primary" data-close-modal="modal-help">我知道了</button>
      </div>
    </div>

    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
